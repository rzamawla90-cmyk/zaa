    <!-- MENU -->
    <section class="grid">

        <a class="card" href="https://lynk.id/zaabook" data-aos="zoom-in" data-aos-delay="150">
            <i class="fa-solid fa-basket-shopping"></i>
            <h3>My Digital Product</h3>
            <span>Shop produk kami</span>

        <a class="card" href="https://wa.me/628132225515" data-aos="zoom-in" data-aos-delay="200">
            <i class="fa-brands fa-whatsapp" ></i>
            <h3>WhatsApp</h3>

         <a class="card" href="https://instagram.com/level.updailyid" data-aos="zoom-in" data-aos-delay="250">

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
    duration: 800,
    once: true,
    easing: 'ease-in-out'
});
</script>

<script>
  const numStars = 300; // lebih banyak
  for(let i = 0; i < numStars; i++){
    const star = document.createElement('div');
    star.classList.add('star');
    
    // posisi horizontal acak
    star.style.left = Math.random() * window.innerWidth + 'px';
    
    // posisi vertikal acak dari atas (-100vh supaya muncul bertahap)
    star.style.top = Math.random() * -window.innerHeight + 'px';
    
    // ukuran acak
    const size = Math.random() * 2 + 1; // 1px sampai 3px
    star.style.width = star.style.height = size + 'px';
    
    // kecepatan acak (lebih bervariasi)
    star.style.animationDuration = (Math.random() * 5 + 3) + 's';
    
    // delay acak supaya jatuh tidak bersamaan
    star.style.animationDelay = Math.random() * 5 + 's';
    
    document.body.appendChild(star);
  }
</script>
</body>
</html>
